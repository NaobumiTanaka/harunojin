<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Harunojin 2km 誘導人員管理</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f5f5; }

/* Header */
.header {
  background: #1565c0; color: white; padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header h1 { font-size: 15px; font-weight: 700; }
.header-sub { font-size: 11px; opacity: 0.8; }
.refresh-btn {
  background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
  color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
}

/* Progress bar */
.progress-bar {
  position: fixed; top: 52px; left: 0; right: 0; z-index: 999;
  background: #e0e0e0; height: 6px;
}
.progress-fill { height: 100%; transition: width 0.5s ease; }

/* Map */
#map { position: fixed; top: 58px; left: 0; right: 0; bottom: 0; z-index: 1; }

/* Stats overlay */
.stats-overlay {
  position: fixed; bottom: 16px; left: 16px; z-index: 900;
  background: white; border-radius: 12px; padding: 12px 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15); font-size: 13px;
  display: flex; gap: 16px;
}
.stat-item { text-align: center; }
.stat-num { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 10px; color: #666; margin-top: 2px; }
.stat-red .stat-num { color: #d32f2f; }
.stat-green .stat-num { color: #2e7d32; }
.stat-gray .stat-num { color: #757575; }

/* List toggle */
.list-toggle {
  position: fixed; bottom: 16px; right: 16px; z-index: 900;
  background: #1565c0; color: white; border: none;
  width: 48px; height: 48px; border-radius: 50%;
  font-size: 20px; cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
}

/* List panel */
.list-panel {
  position: fixed; top: 0; right: -100%; width: 100%; max-width: 380px;
  height: 100%; background: white; z-index: 2000;
  transition: right 0.3s ease; box-shadow: -4px 0 20px rgba(0,0,0,0.2);
  display: flex; flex-direction: column;
}
.list-panel.open { right: 0; }
.list-panel-header {
  background: #1565c0; color: white; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.list-panel-header h2 { font-size: 16px; }
.list-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 4px; }
.list-content { flex: 1; overflow-y: auto; padding: 8px; }
.list-item {
  display: flex; align-items: center; padding: 10px 8px; gap: 10px;
  border-bottom: 1px solid #f0f0f0; cursor: pointer;
}
.list-item:active { background: #f5f5f5; }
.list-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.list-info { flex: 1; }
.list-name { font-size: 13px; font-weight: 600; }
.list-meta { font-size: 11px; color: #888; margin-top: 2px; }
.list-danger { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; color: white; background: #d32f2f; margin-left: 4px; }

/* Legend */
.legend {
  position: fixed; bottom: 16px; right: 70px; z-index: 900;
  background: white; border-radius: 8px; padding: 8px 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-size: 11px;
}
.legend-item { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: 16px 16px 0 0; padding: 20px;
  width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-size: 16px; margin-bottom: 4px; }
.modal-area { font-size: 12px; color: #888; margin-bottom: 12px; }
.modal-memo-box {
  background: #fff3e0; border: 1px solid #ffcc80; border-radius: 8px;
  padding: 10px 12px; margin-bottom: 16px; font-size: 13px;
}
.modal-memo-box .label { font-size: 11px; color: #e65100; font-weight: 700; margin-bottom: 4px; }
.status-btns { display: flex; gap: 8px; margin-bottom: 16px; }
.status-btn {
  flex: 1; padding: 10px 8px; border: 2px solid #ddd; border-radius: 8px;
  background: white; cursor: pointer; text-align: center; font-size: 12px; font-weight: 600;
  transition: all 0.2s;
}
.status-btn[data-status="not_placed"] { color: #d32f2f; }
.status-btn[data-status="placed"] { color: #2e7d32; }
.status-btn[data-status="removed"] { color: #757575; }
.status-btn.active { transform: scale(1.05); }
.status-btn.active[data-status="not_placed"] { background: #ffebee; border-color: #d32f2f; }
.status-btn.active[data-status="placed"] { background: #e8f5e9; border-color: #2e7d32; }
.status-btn.active[data-status="removed"] { background: #f5f5f5; border-color: #757575; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 14px; font-family: inherit;
}
.form-group textarea { height: 60px; resize: none; }
.save-btn {
  width: 100%; padding: 14px; background: #1565c0; color: white;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 8px;
}
.save-btn:disabled { opacity: 0.5; }

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #333; color: white; padding: 10px 20px; border-radius: 8px;
  font-size: 13px; z-index: 5000; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; max-width: 90%;
}
.toast.show { opacity: 1; }

/* Loading */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 4000;
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
.loading-overlay.show { display: flex; }
.loading-spinner {
  width: 36px; height: 36px; border: 3px solid #e0e0e0;
  border-top-color: #1565c0; border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.person-marker {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px;
}
.person-marker svg { filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <h1>Harunojin 2km 誘導人員管理</h1>
    <div class="header-sub" id="lastUpdated">読み込み中...</div>
  </div>

</div>

<!-- List panel -->
<div class="list-panel" id="listPanel">

    <div class="status-btns">
      <button class="status-btn" data-status="not_placed" onclick="selectStatus(this)">未配置</button>

  <div style="font-size:13px;color:#666;">読み込み中...</div>
</div>

<script>
// =============================================
// 設定 — ★ここにGAS WebアプリURLを貼る★
// =============================================
const API_URL = 'https://script.google.com/macros/s/AKfycbyzhonW2b9oDGNWZ1ZOZy0gwcYN-xPvk-ZvCO6ElJ7MuwmJtg4zQhA2Lgj_VEs9QqrA/exec';

// =============================================
// 2kmコース座標データ（KMLから抽出）
// =============================================
const COURSE_COORDS = [
  [37.13212,138.61515],[37.13217,138.6161],[37.13212,138.61616],[37.13193,138.61606],
  [37.13177,138.61606],[37.13151,138.61611],[37.13109,138.61615],[37.13105,138.61529],
  [37.131,138.61443],[37.13106,138.61397],[37.13073,138.61393],[37.13032,138.61407],
  [37.13031,138.61407],[37.13007,138.61386],[37.13007,138.61385],[37.12999,138.6141],
  [37.12989,138.61398],[37.12977,138.6142],[37.12978,138.61435],[37.12977,138.61435],
  [37.12944,138.61452],[37.12909,138.61464],[37.12896,138.6147],[37.12906,138.61485],
  [37.12906,138.61484],[37.12899,138.61495],[37.12879,138.61462],[37.12872,138.61435],
  [37.12879,138.61416],[37.12926,138.61391],[37.12948,138.61369],[37.12955,138.61343],
  [37.1295,138.61324],[37.1295,138.61322],[37.12922,138.61279],[37.12921,138.61278],
  [37.12933,138.61261],[37.12933,138.6126],[37.12965,138.61289],[37.12994,138.61311],
  [37.13015,138.61303],[37.13026,138.61285],[37.13061,138.61262],[37.1306,138.61262],
  [37.13074,138.61249],[37.13089,138.61249],[37.13102,138.61235],[37.13118,138.61235],
  [37.13113,138.61252],[37.13113,138.61251],[37.13096,138.61263],[37.13085,138.61274],
  [37.13075,138.61296],[37.13075,138.61295],[37.1307,138.61322],[37.13069,138.61322],
  [37.13064,138.61345],[37.13071,138.61365],[37.13073,138.61399],[37.13109,138.61403],
  [37.13109,138.61513],[37.13116,138.61608],[37.13153,138.61604],[37.13136,138.61548],
  [37.13138,138.61493],[37.13138,138.61492],[37.13138,138.61429],[37.13151,138.61362],
  [37.13168,138.61373],[37.13203,138.61379],[37.1321,138.61426],[37.13213,138.61496],
  [37.13212,138.61496],[37.13217,138.61515]
];

// =============================================
// ボランティア配置地点データ（KMLから統合・番号振り直し）
// =============================================
const VOLUNTEERS = [
  { id:'2k-01', num:'1',  lat:37.13216,   lng:138.6161996, desc:'', memo:'', danger:false },
  { id:'2k-02', num:'2',  lat:37.1315185, lng:138.6161674, desc:'', memo:'', danger:false },
  { id:'2k-03', num:'3',  lat:37.1310908, lng:138.6161835, desc:'', memo:'', danger:false },
  { id:'2k-04', num:'4',  lat:37.13106,   lng:138.61397,   desc:'', memo:'', danger:false },
  { id:'2k-05', num:'5',  lat:37.130321,  lng:138.6141075, desc:'', memo:'', danger:false },
  { id:'2k-06', num:'6',  lat:37.1298463, lng:138.6143811, desc:'狭い橋 / narrow bridge', memo:'危険箇所！信頼できる人を配置。子供に注意を呼びかける', danger:true },
  { id:'2k-07', num:'7',  lat:37.1290593, lng:138.6149604, desc:'', memo:'', danger:false },
  { id:'2k-08', num:'8',  lat:37.1287086, lng:138.6144508, desc:'道路横断 / road crossing', memo:'危険箇所。車にスピードダウンを呼びかける', danger:true },
  { id:'2k-09', num:'9',  lat:37.1295725, lng:138.61363,   desc:'', memo:'', danger:false },
  { id:'2k-10', num:'10', lat:37.1292945, lng:138.6126269, desc:'', memo:'', danger:false },
  { id:'2k-11', num:'11', lat:37.1301627, lng:138.612938,  desc:'', memo:'車にスピードダウンを呼びかける', danger:true },
  { id:'2k-12', num:'12', lat:37.1312234, lng:138.6123158, desc:'', memo:'', danger:false },
  { id:'2k-13', num:'13', lat:37.1307572, lng:138.6138714, desc:'', memo:'', danger:false },
  { id:'2k-14', num:'14', lat:37.13151,   lng:138.61362,   desc:'', memo:'', danger:false },
  { id:'2k-15', num:'15', lat:37.1320788, lng:138.613791,  desc:'', memo:'', danger:false },
];

// ステータス色
const STATUS_COLORS = { not_placed: '#d32f2f', placed: '#2e7d32', removed: '#757575' };
const STATUS_LABELS = { not_placed: '未配置', placed: '配置済み', removed: '撤収済み' };

// 状態
let map;
let volData = {};
let volMarkers = {};
let currentVolId = null;

// =============================================
// 人型SVGアイコン
// =============================================
function personSvg(color) {
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="' + color + '">' +
    '<circle cx="12" cy="4" r="3"/>' +
    '<path d="M12 8c-3 0-5 1.5-5 3v3h2v6h6v-6h2v-3c0-1.5-2-3-5-3z"/>' +
    '</svg>';
}

// 危険マーカー（赤い三角+人型）
function dangerSvg(color) {
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 34" width="28" height="34">' +
    '<polygon points="14,0 28,12 0,12" fill="#d32f2f" opacity="0.8"/>' +
    '<text x="14" y="10" text-anchor="middle" fill="white" font-size="8" font-weight="bold">!</text>' +
    '<g transform="translate(2,12)">' +
    '<svg viewBox="0 0 24 24" width="24" height="22" fill="' + color + '">' +
    '<circle cx="12" cy="4" r="3"/>' +
    '<path d="M12 8c-3 0-5 1.5-5 3v3h2v6h6v-6h2v-3c0-1.5-2-3-5-3z"/>' +
    '</svg></g></svg>';
}

// =============================================
// 地図初期化
// =============================================
function initMap() {
  map = L.map('map', { zoomControl: true });

  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
    attribution: '<a href="https://maps.gsi.go.jp/" target="_blank">地理院タイル</a>',
    maxZoom: 18
  }).addTo(map);

  // コースライン
  L.polyline(COURSE_COORDS, { color: '#0288D1', weight: 5, opacity: 0.8 }).addTo(map);

  // スタート・ゴール
  [{ name:'START', lat:37.13212, lng:138.61515, color:'#2e7d32' },
   { name:'GOAL',  lat:37.13217, lng:138.61515, color:'#d32f2f' }].forEach(sg => {
    L.marker([sg.lat, sg.lng], {
      icon: L.divIcon({
        className: '',
        html: '<div style="background:'+sg.color+';color:white;padding:4px 10px;border-radius:3px;font-size:12px;font-weight:900;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.4);letter-spacing:1px;">'+sg.name+'</div>',
        iconSize: null
      })
    }).addTo(map);
  });

  // ボランティアマーカー
  VOLUNTEERS.forEach(v => {
    volData[v.id] = volData[v.id] || {
      status: 'not_placed', member_name: '', phone: '', shift: 'morning', role: '誘導',
      admin_memo: v.memo, member_memo: '', updated_at: ''
    };
    addVolMarker(v);
  });

  const bounds = L.latLngBounds(COURSE_COORDS);
  map.fitBounds(bounds, { padding: [30, 30] });
}

function addVolMarker(v) {
  const data = volData[v.id] || { status: 'not_placed' };
  const color = STATUS_COLORS[data.status] || STATUS_COLORS.not_placed;
  const iconHtml = v.danger ? dangerSvg(color) : personSvg(color);
  const iconSize = v.danger ? [28, 34] : [28, 28];
  const iconAnchor = v.danger ? [14, 34] : [14, 24];

  const icon = L.divIcon({ className: 'person-marker', html: iconHtml, iconSize, iconAnchor });
  const marker = L.marker([v.lat, v.lng], { icon }).addTo(map);
  marker.bindTooltip('#' + v.num + (v.desc ? ' ' + v.desc : ''), { permanent: false, direction: 'top', offset: [0, -20] });
  marker.on('click', () => openModal(v.id));
  volMarkers[v.id] = marker;
}

function updateVolMarker(volId) {
  if (!volMarkers[volId]) return;
  const v = VOLUNTEERS.find(x => x.id === volId);
  if (!v) return;
  const data = volData[volId] || { status: 'not_placed' };
  const color = STATUS_COLORS[data.status] || STATUS_COLORS.not_placed;
  const iconHtml = v.danger ? dangerSvg(color) : personSvg(color);
  const iconSize = v.danger ? [28, 34] : [28, 28];
  const iconAnchor = v.danger ? [14, 34] : [14, 24];
  volMarkers[volId].setIcon(L.divIcon({ className: 'person-marker', html: iconHtml, iconSize, iconAnchor }));
}

// =============================================
// JSONP通信
// =============================================
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName = '_jsonp_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const timeout = setTimeout(() => {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('タイムアウト'));
    }, 15000);
    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };
    const sep = url.includes('?') ? '&' : '?';
    const script = document.createElement('script');
    script.src = url + sep + 'callback=' + cbName;
    script.onerror = () => { clearTimeout(timeout); delete window[cbName]; reject(new Error('通信エラー')); };
    document.body.appendChild(script);
  });
}

// =============================================
// データ読み込み
// =============================================
async function loadData() {
  if (!API_URL) {
    showToast('デモモード: API_URLを設定してください');
    updateUI();
    return;
  }

  showLoading(true);
  try {
    const json = await jsonp(API_URL);
    if (json.error) throw new Error(json.error);

    if (json.sections) {
      json.sections.forEach(row => {
        if (!row.section_id || !row.section_id.startsWith('2k-')) return;
        const existing = volData[row.section_id] || {};
        const v = VOLUNTEERS.find(x => x.id === row.section_id);
        volData[row.section_id] = {
          status: row.status || 'not_placed',
          member_name: row.worker || '',
          phone: row.phone || '',
          shift: row.shift || 'morning',
          role: row.role || '誘導',
          admin_memo: row.memo || existing.admin_memo || (v ? v.memo : ''),
          member_memo: row.member_memo || '',
          updated_at: row.updated_at || ''
        };
        updateVolMarker(row.section_id);
      });
    }
    updateUI();
    document.getElementById('lastUpdated').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
  } catch (err) {
    showToast('読み込みエラー: ' + err.message);
    console.error(err);
  } finally {
    showLoading(false);
  }
}

// =============================================
// UI更新
// =============================================
function updateUI() {
  let counts = { not_placed: 0, placed: 0, removed: 0 };
  VOLUNTEERS.forEach(v => {
    const data = volData[v.id] || { status: 'not_placed' };
    counts[data.status] = (counts[data.status] || 0) + 1;
  });
  document.getElementById('countNotPlaced').textContent = counts.not_placed;
  document.getElementById('countPlaced').textContent = counts.placed;
  document.getElementById('countRemoved').textContent = counts.removed;
  const pct = Math.round((counts.placed / VOLUNTEERS.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  buildList();
}

// =============================================
// リスト
// =============================================
function buildList() {
  const container = document.getElementById('listContent');
  container.innerHTML = '';
  VOLUNTEERS.forEach(v => {
    const data = volData[v.id] || { status: 'not_placed' };
    const color = STATUS_COLORS[data.status] || STATUS_COLORS.not_placed;
    const statusText = STATUS_LABELS[data.status] || '未配置';
    let meta = statusText;
    if (data.member_name) meta += ' / ' + data.member_name;

    const item = document.createElement('div');
    item.className = 'list-item';
    item.onclick = () => { toggleList(); openModal(v.id); };
    item.innerHTML = '<div class="list-dot" style="background:' + color + '"></div>' +
      '<div class="list-info"><div class="list-name">#' + v.num +
      (v.desc ? ' ' + v.desc : '') +
      (v.danger ? '<span class="list-danger">⚠ 危険</span>' : '') +
      '</div><div class="list-meta">' + meta + '</div></div>';
    container.appendChild(item);
  });
}

function toggleList() {
  document.getElementById('listPanel').classList.toggle('open');
}

// =============================================
// モーダル
// =============================================
function openModal(volId) {
  currentVolId = volId;
  const v = VOLUNTEERS.find(x => x.id === volId);
  if (!v) return;
  const data = volData[volId] || { status:'not_placed', member_name:'', phone:'', shift:'morning', role:'誘導', admin_memo:v.memo, member_memo:'' };

  document.getElementById('modalTitle').textContent = '#' + v.num + (v.desc ? ' — ' + v.desc : '');
  const areaEl = document.getElementById('modalArea');
  const gmapUrl = 'https://www.google.com/maps?q=' + v.lat + ',' + v.lng;
  areaEl.innerHTML = (v.danger ? '⚠ 危険箇所 / Danger Point' : '誘導地点 / Guide Point') +
    ' &nbsp;<a href="' + gmapUrl + '" target="_blank" rel="noopener" style="color:#1565c0;text-decoration:none;font-weight:600;">📍 Google Maps で開く</a>';

  const memoBox = document.getElementById('modalMemoBox');
  if (v.memo) {
    memoBox.style.display = 'block';
    document.getElementById('memoText').textContent = v.memo;
  } else {
    memoBox.style.display = 'none';
  }

  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.status === data.status);
  });

  document.getElementById('inputShift').value = data.shift || 'morning';
  document.getElementById('inputRole').value = data.role || '誘導';
  document.getElementById('inputMember').value = data.member_name || '';
  document.getElementById('inputPhone').value = data.phone || '';
  document.getElementById('inputAdminMemo').value = data.admin_memo || v.memo || '';
  document.getElementById('inputMemberMemo').value = data.member_memo || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === e.currentTarget) {
    document.getElementById('modalOverlay').classList.remove('open');
    currentVolId = null;
  }
}

function selectStatus(btn) {
  document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// =============================================
// 保存
// =============================================
async function saveVolunteer() {
  if (!currentVolId) return;
  const statusBtn = document.querySelector('.status-btn.active');
  if (!statusBtn) { showToast('ステータスを選択してください'); return; }

  const status = statusBtn.dataset.status;
  const member_name = document.getElementById('inputMember').value.trim();
  const phone = document.getElementById('inputPhone').value.trim();
  const shift = document.getElementById('inputShift').value;
  const role = document.getElementById('inputRole').value;
  const admin_memo = document.getElementById('inputAdminMemo').value.trim();
  const member_memo = document.getElementById('inputMemberMemo').value.trim();
  const v = VOLUNTEERS.find(x => x.id === currentVolId);

  // ローカル即時反映
  volData[currentVolId] = {
    status, member_name, phone, shift, role, admin_memo, member_memo,
    updated_at: new Date().toISOString()
  };
  updateVolMarker(currentVolId);
  updateUI();

  if (!API_URL) {
    showToast('保存しました（デモモード）');
    document.getElementById('modalOverlay').classList.remove('open');
    currentVolId = null;
    return;
  }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';

  try {
    const params = new URLSearchParams({
      action: 'update',
      section_id: currentVolId,
      name: v ? ('#' + v.num + (v.desc ? ' ' + v.desc : '')) : currentVolId,
      status,
      worker: member_name,
      phone,
      shift,
      role,
      memo: admin_memo,
      member_memo
    });

    let json = await jsonp(API_URL + '?' + params.toString());

    if (json.success) {
      // OK
    } else if (json.error && json.error.includes('見つかりません')) {
      const addParams = new URLSearchParams({
        action: 'add',
        section_id: currentVolId,
        name: v ? ('#' + v.num + (v.desc ? ' ' + v.desc : '')) : currentVolId,
        status,
        worker: member_name,
        phone,
        shift,
        role,
        memo: admin_memo,
        member_memo
      });
      const addJson = await jsonp(API_URL + '?' + addParams.toString());
      if (!addJson.success && !addJson.sections) {
        throw new Error(addJson.error || 'データの追加に失敗しました');
      }
    } else if (json.error) {
      throw new Error(json.error);
    }

    showToast('保存しました');
    document.getElementById('modalOverlay').classList.remove('open');
    currentVolId = null;
  } catch (err) {
    showToast('保存エラー: ' + err.message);
    console.error(err);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '保存する / Save';
  }
}

// =============================================
// ユーティリティ
// =============================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('show', show);
}

// =============================================
// 初期化
// =============================================
document.addEventListener('DOMContentLoaded', async () => {
  showLoading(true);
  initMap();
  await loadData();
  showLoading(false);
});
</script>
</body>
</html>
