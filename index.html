<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Harunojin Trail 草刈り管理</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f5f5; }

/* Header */
.header {
  background: #1a5c2e; color: white; padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header h1 { font-size: 16px; font-weight: 700; }
.header-sub { font-size: 11px; opacity: 0.8; }
.refresh-btn {
  background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
  color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
}
.refresh-btn:active { background: rgba(255,255,255,0.3); }

/* Progress bar */
.progress-bar {
  position: fixed; top: 52px; left: 0; right: 0; z-index: 999;
  background: #e0e0e0; height: 6px;
}
.progress-fill { height: 100%; transition: width 0.5s ease; }

/* Map */
#map { position: fixed; top: 58px; left: 0; right: 0; bottom: 0; z-index: 1; }

/* Stats overlay */
.stats-overlay {
  position: fixed; bottom: 16px; left: 16px; z-index: 900;
  background: white; border-radius: 12px; padding: 12px 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15); font-size: 13px;
  display: flex; gap: 16px;
}
.stat-item { text-align: center; }
.stat-num { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 10px; color: #666; margin-top: 2px; }
.stat-red .stat-num { color: #d32f2f; }
.stat-yellow .stat-num { color: #f9a825; }
.stat-green .stat-num { color: #2e7d32; }

/* List toggle */
.list-toggle {
  position: fixed; bottom: 16px; right: 16px; z-index: 900;
  background: #1a5c2e; color: white; border: none;
  width: 48px; height: 48px; border-radius: 50%;
  font-size: 20px; cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
}

/* Section list panel */
.list-panel {
  position: fixed; top: 0; right: -100%; width: 100%; max-width: 380px;
  height: 100%; background: white; z-index: 2000;
  transition: right 0.3s ease; box-shadow: -4px 0 20px rgba(0,0,0,0.2);
  display: flex; flex-direction: column;
}
.list-panel.open { right: 0; }
.list-panel-header {
  background: #1a5c2e; color: white; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.list-panel-header h2 { font-size: 16px; }
.list-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 4px; }
.list-content { flex: 1; overflow-y: auto; padding: 8px; }
.list-area-header {
  font-size: 13px; font-weight: 700; color: #1a5c2e;
  padding: 8px 8px 4px; margin-top: 4px; border-bottom: 1px solid #e0e0e0;
}
.list-item {
  display: flex; align-items: center; padding: 10px 8px;
  border-bottom: 1px solid #f0f0f0; cursor: pointer; gap: 10px;
}
.list-item:active { background: #f5f5f5; }
.list-status-dot {
  width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
}
.list-item-info { flex: 1; min-width: 0; }
.list-item-name { font-size: 13px; font-weight: 600; }
.list-item-meta { font-size: 11px; color: #888; margin-top: 2px; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 3000; display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: 16px 16px 0 0; width: 100%; max-width: 500px;
  padding: 20px 20px 32px; max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.modal-area { font-size: 13px; color: #666; margin-bottom: 16px; }
.modal-section { margin-bottom: 16px; }
.modal-label { font-size: 12px; font-weight: 600; color: #444; margin-bottom: 6px; }

/* Status buttons */
.status-btns { display: flex; gap: 8px; }
.status-btn {
  flex: 1; padding: 12px 8px; border-radius: 10px; border: 2px solid #ddd;
  background: white; cursor: pointer; text-align: center; font-size: 13px; font-weight: 600;
  transition: all 0.2s;
}
.status-btn.active { border-width: 3px; }
.status-btn[data-status="not_started"] { color: #d32f2f; }
.status-btn[data-status="not_started"].active { border-color: #d32f2f; background: #ffebee; }
.status-btn[data-status="in_progress"] { color: #f57f17; }
.status-btn[data-status="in_progress"].active { border-color: #f9a825; background: #fff8e1; }
.status-btn[data-status="completed"] { color: #2e7d32; }
.status-btn[data-status="completed"].active { border-color: #2e7d32; background: #e8f5e9; }

/* Inputs */
.modal-input {
  width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 14px; font-family: inherit;
}
.modal-input:focus { outline: none; border-color: #1a5c2e; }
textarea.modal-input { min-height: 60px; resize: vertical; }

/* Save button */
.save-btn {
  width: 100%; padding: 14px; background: #1a5c2e; color: white;
  border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-top: 8px;
}
.save-btn:active { background: #145224; }
.save-btn:disabled { background: #ccc; cursor: not-allowed; }

/* Toast */
.toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  background: #333; color: white; padding: 10px 20px; border-radius: 8px;
  font-size: 13px; z-index: 5000; opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Loading */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(255,255,255,0.8);
  z-index: 4000; display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 36px; height: 36px; border: 3px solid #e0e0e0;
  border-top-color: #1a5c2e; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Updated info in modal */
.modal-updated { font-size: 11px; color: #999; margin-top: 12px; text-align: right; }

/* Legend on map */
.map-legend {
  background: white; padding: 8px 12px; border-radius: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.15); font-size: 11px; line-height: 1.8;
}
.legend-row { display: flex; align-items: center; gap: 6px; }
.legend-line { width: 20px; height: 4px; border-radius: 2px; }

/* Desktop adjustments */
@media (min-width: 600px) {
  .stats-overlay { bottom: 24px; left: 24px; padding: 14px 20px; }
  .list-toggle { bottom: 24px; right: 24px; }
  .modal { border-radius: 16px; margin-bottom: 20px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <h1>🌿 Harunojin Trail 草刈り管理</h1>
    <div class="header-sub" id="lastUpdated">読み込み中...</div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ 更新</button>
</div>

<!-- Progress bar -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="width:0%; background: linear-gradient(90deg, #2e7d32, #4caf50);"></div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Stats -->
<div class="stats-overlay">
  <div class="stat-item stat-red"><div class="stat-num" id="countNotStarted">-</div><div class="stat-label">未着手</div></div>
  <div class="stat-item stat-yellow"><div class="stat-num" id="countInProgress">-</div><div class="stat-label">作業中</div></div>
  <div class="stat-item stat-green"><div class="stat-num" id="countCompleted">-</div><div class="stat-label">完了</div></div>
</div>

<!-- List toggle -->
<button class="list-toggle" onclick="toggleList()">☰</button>

<!-- List panel -->
<div class="list-panel" id="listPanel">
  <div class="list-panel-header">
    <h2>区間一覧</h2>
    <button class="list-close" onclick="toggleList()">✕</button>
  </div>
  <div class="list-content" id="listContent"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-area" id="modalArea"></div>

    <div class="modal-section">
      <div class="modal-label">ステータス</div>
      <div class="status-btns">
        <button class="status-btn" data-status="not_started" onclick="selectStatus('not_started')">🔴<br>未着手</button>
        <button class="status-btn" data-status="in_progress" onclick="selectStatus('in_progress')">🟡<br>作業中</button>
        <button class="status-btn" data-status="completed" onclick="selectStatus('completed')">🟢<br>完了</button>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-label">作業者名（任意）</div>
      <input type="text" class="modal-input" id="inputWorker" placeholder="例: 田中">
    </div>

    <div class="modal-section">
      <div class="modal-label">メモ（任意）</div>
      <textarea class="modal-input" id="inputMemo" placeholder="例: 倒木あり、急斜面注意"></textarea>
    </div>

    <button class="save-btn" id="saveBtn" onclick="saveSection()">保存する</button>
    <div class="modal-updated" id="modalUpdated"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-size:13px; color:#666;">読み込み中...</div>
</div>

<script>
// =============================================
// 設定 - ここを変更してください
// =============================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxjJhSpyByY3elxc1bJQAOpA6GW9YYeE_NGixXZQ7kUoA5QtYXO7L3TSeHsYRxCp2DsFA/exec	'; // ← Google Apps Script のデプロイURL を入力
// 例: 'https://script.google.com/macros/s/XXXXX/exec'

// =============================================
// コース座標データ — 起動時にGoogle My Maps KMLから取得
// =============================================
const KML_URL = 'https://www.google.com/maps/d/kml?mid=1PGd6THjqNEnfm1VogxyeYc8sHi548p8&forcekml=1';
let COURSE_COORDS = []; // KML読み込み後にセットされる

async function loadKML() {
  try {
    const res = await fetch(KML_URL);
    const text = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(text, 'text/xml');
    const lineEl = doc.querySelector('LineString coordinates');
    if (lineEl) {
      COURSE_COORDS = lineEl.textContent.trim().split(/\s+/).map(c => {
        const [lng, lat] = c.split(',').map(Number);
        return [lat, lng];
      });
      console.log('KML loaded:', COURSE_COORDS.length, 'points');
    }
  } catch (e) {
    console.error('KML load error:', e);
    showToast('コースデータの読み込みに失敗しました');
  }
}

// =============================================
// 区間定義
// =============================================
const SECTIONS = [
  { id:'sec-01', area:'松代城', name:'松代城スタート付近', startIdx:0, endIdx:50 },
  { id:'sec-02', area:'太平', name:'太平への登り', startIdx:51, endIdx:96 },
  { id:'sec-03', area:'太平〜会沢', name:'太平〜会沢', startIdx:97, endIdx:130 },
  { id:'sec-04', area:'会沢', name:'会沢 入口', startIdx:131, endIdx:165 },
  { id:'sec-05', area:'会沢', name:'会沢 中央', startIdx:166, endIdx:200 },
  { id:'sec-06', area:'会沢', name:'会沢 奥', startIdx:201, endIdx:240 },
  { id:'sec-07', area:'会沢〜蓬平', name:'会沢〜蓬平 前半', startIdx:241, endIdx:290 },
  { id:'sec-08', area:'会沢〜蓬平', name:'会沢〜蓬平 後半', startIdx:291, endIdx:340 },
  { id:'sec-09', area:'蓬平', name:'蓬平周辺', startIdx:341, endIdx:380 },
  { id:'sec-10', area:'蓬平〜仙納', name:'蓬平〜仙納', startIdx:381, endIdx:420 },
  { id:'sec-11', area:'仙納', name:'仙納周辺', startIdx:421, endIdx:453 },
  { id:'sec-12', area:'田野倉', name:'田野倉', startIdx:454, endIdx:483 },
  { id:'sec-13', area:'名平', name:'名平 前半', startIdx:484, endIdx:520 },
  { id:'sec-14', area:'名平', name:'名平 後半', startIdx:521, endIdx:557 },
  { id:'sec-15', area:'蒲生', name:'蒲生 前半', startIdx:558, endIdx:587 },
  { id:'sec-16', area:'蒲生', name:'蒲生 後半', startIdx:588, endIdx:622 },
  { id:'sec-17', area:'池尻', name:'池尻 入口', startIdx:623, endIdx:644 },
  { id:'sec-18', area:'池尻', name:'池尻 中央', startIdx:645, endIdx:660 },
  { id:'sec-19', area:'池尻', name:'池尻 奥', startIdx:661, endIdx:688 },
  { id:'sec-20', area:'千年', name:'千年 前半', startIdx:689, endIdx:705 },
  { id:'sec-21', area:'千年', name:'千年 後半', startIdx:706, endIdx:720 },
  { id:'sec-22', area:'千年〜松代城', name:'千年〜松代城', startIdx:721, endIdx:740 },
  { id:'sec-23', area:'松代城', name:'松代城周辺', startIdx:741, endIdx:759 },
  { id:'sec-24', area:'能舞台', name:'能舞台', startIdx:760, endIdx:770 },
  { id:'sec-25', area:'能舞台', name:'能舞台〜ゴール', startIdx:771, endIdx:774 }
];

// エイドステーション
const AID_STATIONS = [
  { name:'Aid Station 1', lat:37.1481458, lng:138.6100701 },
  { name:'Aid Station 2', lat:37.1379995, lng:138.5791669 },
  { name:'Aid Station 3', lat:37.1179288, lng:138.5916957 }
];

// =============================================
// 状態管理
// =============================================
const STATUS_COLORS = {
  not_started: '#d32f2f',
  in_progress: '#f9a825',
  completed: '#2e7d32'
};
const STATUS_LABELS = {
  not_started: '未着手',
  in_progress: '作業中',
  completed: '完了'
};

let sectionData = {};  // section_id -> { status, worker, memo, updated_at }
let sectionLayers = {}; // section_id -> Leaflet polyline
let currentSectionId = null;
let map;

// =============================================
// 地図初期化
// =============================================
function initMap() {
  map = L.map('map', {
    center: [37.133, 138.605],
    zoom: 13,
    zoomControl: false
  });

  L.control.zoom({ position: 'topright' }).addTo(map);

  // タイルレイヤー（地理院地図）
  L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
    attribution: '<a href="https://maps.gsi.go.jp/" target="_blank">地理院タイル</a>',
    maxZoom: 18
  }).addTo(map);

  // エイドステーションマーカー
  AID_STATIONS.forEach(a => {
    L.marker([a.lat, a.lng], {
      icon: L.divIcon({
        className: '',
        html: '<div style="background:#ff6d00;color:white;padding:3px 6px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.3);">⛑ ' + a.name + '</div>',
        iconSize: null, iconAnchor: [40, 10]
      })
    }).addTo(map);
  });

  // 凡例
  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'map-legend');
    div.innerHTML = `
      <div class="legend-row"><div class="legend-line" style="background:#d32f2f"></div> 未着手</div>
      <div class="legend-row"><div class="legend-line" style="background:#f9a825"></div> 作業中</div>
      <div class="legend-row"><div class="legend-line" style="background:#2e7d32"></div> 完了</div>
    `;
    return div;
  };
  legend.addTo(map);

  // 区間ポリラインを描画
  SECTIONS.forEach(sec => {
    const coords = COURSE_COORDS.slice(sec.startIdx, sec.endIdx + 1);
    const polyline = L.polyline(coords, {
      color: '#d32f2f',
      weight: 6,
      opacity: 0.85,
      lineCap: 'round',
      lineJoin: 'round'
    }).addTo(map);

    polyline.on('click', () => openModal(sec.id));

    // ホバー時に太く
    polyline.on('mouseover', function() { this.setStyle({ weight: 10 }); });
    polyline.on('mouseout', function() { this.setStyle({ weight: 6 }); });

    sectionLayers[sec.id] = polyline;
  });

  // 全コースが見えるようにフィット
  const allBounds = L.latLngBounds(COURSE_COORDS);
  map.fitBounds(allBounds, { padding: [30, 30] });
}

// =============================================
// データ読み込み
// =============================================
async function loadData() {
  if (!API_URL) {
    // API未設定時はデモモード
    showToast('デモモード: API_URLを設定してください');
    SECTIONS.forEach(sec => {
      sectionData[sec.id] = {
        status: 'not_started', worker: '', memo: '', updated_at: ''
      };
    });
    updateUI();
    return;
  }

  showLoading(true);
  try {
    const res = await fetch(API_URL);
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    json.sections.forEach(row => {
      sectionData[row.section_id] = {
        status: row.status || 'not_started',
        worker: row.worker || '',
        memo: row.memo || '',
        updated_at: row.updated_at || ''
      };
    });
    updateUI();
    document.getElementById('lastUpdated').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
  } catch (err) {
    showToast('読み込みエラー: ' + err.message);
    console.error(err);
  } finally {
    showLoading(false);
  }
}

// =============================================
// UI更新
// =============================================
function updateUI() {
  let counts = { not_started: 0, in_progress: 0, completed: 0 };

  SECTIONS.forEach(sec => {
    const data = sectionData[sec.id] || { status: 'not_started' };
    const color = STATUS_COLORS[data.status] || STATUS_COLORS.not_started;

    // ポリラインの色更新
    if (sectionLayers[sec.id]) {
      sectionLayers[sec.id].setStyle({ color });
    }

    counts[data.status] = (counts[data.status] || 0) + 1;
  });

  // カウント更新
  document.getElementById('countNotStarted').textContent = counts.not_started;
  document.getElementById('countInProgress').textContent = counts.in_progress;
  document.getElementById('countCompleted').textContent = counts.completed;

  // プログレスバー
  const total = SECTIONS.length;
  const pct = Math.round((counts.completed / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  // リスト更新
  updateList();
}

// =============================================
// リスト表示
// =============================================
function updateList() {
  const container = document.getElementById('listContent');
  let html = '';
  let currentArea = '';

  SECTIONS.forEach(sec => {
    if (sec.area !== currentArea) {
      currentArea = sec.area;
      html += `<div class="list-area-header">${currentArea}</div>`;
    }

    const data = sectionData[sec.id] || { status: 'not_started' };
    const color = STATUS_COLORS[data.status];
    const label = STATUS_LABELS[data.status];
    const meta = [];
    if (data.worker) meta.push('👤 ' + data.worker);
    if (data.memo) meta.push('📝 ' + data.memo);
    if (data.updated_at) {
      const d = new Date(data.updated_at);
      if (!isNaN(d)) meta.push(d.toLocaleDateString('ja-JP'));
    }

    html += `
      <div class="list-item" onclick="openModal('${sec.id}'); toggleList();">
        <div class="list-status-dot" style="background:${color}"></div>
        <div class="list-item-info">
          <div class="list-item-name">${sec.name}</div>
          <div class="list-item-meta">${label}${meta.length ? ' · ' + meta.join(' · ') : ''}</div>
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function toggleList() {
  document.getElementById('listPanel').classList.toggle('open');
}

// =============================================
// モーダル
// =============================================
function openModal(sectionId) {
  currentSectionId = sectionId;
  const sec = SECTIONS.find(s => s.id === sectionId);
  const data = sectionData[sectionId] || { status: 'not_started', worker: '', memo: '' };

  document.getElementById('modalTitle').textContent = sec.name;
  document.getElementById('modalArea').textContent = 'エリア: ' + sec.area;
  document.getElementById('inputWorker').value = data.worker || '';
  document.getElementById('inputMemo').value = data.memo || '';

  // ステータスボタン
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.status === data.status);
  });

  // 更新日時
  if (data.updated_at) {
    const d = new Date(data.updated_at);
    document.getElementById('modalUpdated').textContent =
      '最終更新: ' + (!isNaN(d) ? d.toLocaleString('ja-JP') : data.updated_at);
  } else {
    document.getElementById('modalUpdated').textContent = '';
  }

  document.getElementById('modalOverlay').classList.add('open');

  // 該当区間にズーム
  if (sectionLayers[sectionId]) {
    map.fitBounds(sectionLayers[sectionId].getBounds(), { padding: [60, 60], maxZoom: 16 });
    sectionLayers[sectionId].setStyle({ weight: 10 });
    setTimeout(() => sectionLayers[sectionId].setStyle({ weight: 6 }), 1500);
  }
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('open');
  currentSectionId = null;
}

function selectStatus(status) {
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.status === status);
  });
}

// =============================================
// 保存
// =============================================
async function saveSection() {
  if (!currentSectionId) return;

  const statusBtn = document.querySelector('.status-btn.active');
  if (!statusBtn) { showToast('ステータスを選択してください'); return; }

  const status = statusBtn.dataset.status;
  const worker = document.getElementById('inputWorker').value.trim();
  const memo = document.getElementById('inputMemo').value.trim();

  // ローカル即時反映
  sectionData[currentSectionId] = {
    status, worker, memo, updated_at: new Date().toISOString()
  };
  updateUI();

  if (!API_URL) {
    showToast('保存しました（デモモード）');
    closeModal({ target: document.getElementById('modalOverlay'), currentTarget: document.getElementById('modalOverlay') });
    return;
  }

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        section_id: currentSectionId,
        status, worker, memo
      })
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    showToast('保存しました ✓');
    document.getElementById('modalOverlay').classList.remove('open');
    currentSectionId = null;
  } catch (err) {
    showToast('保存エラー: ' + err.message);
    console.error(err);
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = '保存する';
  }
}

// =============================================
// ユーティリティ
// =============================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showLoading(show) {
  document.getElementById('loadingOverlay').classList.toggle('show', show);
}

// =============================================
// 初期化
// =============================================
document.addEventListener('DOMContentLoaded', async () => {
  showLoading(true);
  await loadKML();
  if (COURSE_COORDS.length === 0) {
    showToast('コースデータを取得できませんでした。ページを再読み込みしてください。');
    showLoading(false);
    return;
  }
  initMap();
  await loadData();
  showLoading(false);
});
</script>
</body>
